name: Pikafish A/B Elo Test

# Chạy tay từ tab "Actions" trên GitHub (workflow_dispatch), điền số ván /
# movetime / đường dẫn patch. Không tự chạy khi push, để tránh tốn phút CI
# miễn phí ngoài ý muốn -- muốn tự động hoá theo push thì đổi phần "on:".
on:
  workflow_dispatch:
    inputs:
      patch_file:
        description: "Đường dẫn file .patch trong repo này"
        required: true
        default: "patches/pikafish-aggro-HEAD-v2.patch"
      games:
        description: "Số ván"
        required: false
        default: "40"
      movetime:
        description: "ms suy nghĩ mỗi nước"
        required: false
        default: "2000"
      min_score:
        description: "Ngưỡng score tối thiểu để job PASS (0.0-1.0, vd 0.5 = phải hòa vốn trở lên)"
        required: false
        default: "0.45"
      build_book:
        description: "Có xây .obk book (chỉ trung+tàn cuộc, khai cuộc đã có CDB online) không"
        required: false
        default: "true"
      promote_candidates:
        description: "Số vị trí tối đa nâng cấp lên depth>=30 mỗi lần chạy (0 = bỏ qua bước này)"
        required: false
        default: "5"

env:
  # Dùng đúng công thức build mà chính CI của official-pikafish/Pikafish đã
  # xác nhận chạy được trên GitHub-hosted runner (.github/workflows/pikafish.yml
  # trong repo gốc) -- KHÔNG dùng ARCH=avx2 + COMP=gcc + profile-build như bản
  # nháp trước (bản đó chưa ai xác nhận chạy được trên CI, và profile-build
  # tốn CPU/RAM hơn hẳn 'build' thường vì phải build 2 lần (PGO): 1 lần bản
  # instrumented, chạy benchmark lấy profile, rồi build lại lần 2).
  PIKAFISH_ARCH: x86-64-universal
  PIKAFISH_COMP: clang
  # Chốt ở commit MỚI NHẤT (cùng thời điểm với master-net hiện tại) thay vì
  # commit cũ 8ab92480 -- lý do: master-net trên GitHub Releases là 1 tag
  # BỊ GHI ĐÈ liên tục, không giữ lịch sử. Pin vào commit cũ + luôn tải net
  # mới nhất gây lệch phiên bản (network không load được -- xem issue #130
  # của chính dự án Pikafish, cùng triệu chứng). Patch đã được port lại để
  # áp đúng lên commit này.
  BASE_COMMIT: 7c09ec2578c3b7a48ce4ee5cd067971ef9c4c320
  PIKAFISH_REPO: https://github.com/official-pikafish/Pikafish.git

jobs:
  ab-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 480
    permissions:
      contents: write  # needed to commit the growing .obk book back to this repo
    steps:
      - name: Checkout this repo (patch file + scripts)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up clang/libc++ (same recipe official Pikafish CI uses)
        run: |
          LLVM_VERSION=22
          curl -s https://apt.llvm.org/llvm.sh | sudo bash -s -- $LLVM_VERSION
          sudo apt-get install -y libc++-$LLVM_VERSION-dev libc++abi-$LLVM_VERSION-dev libunwind-$LLVM_VERSION-dev
          echo "EXTRACXXFLAGS=-stdlib=libc++" >> "$GITHUB_ENV"
          echo "EXTRALDFLAGS=-stdlib=libc++" >> "$GITHUB_ENV"
          echo "/usr/lib/llvm-$LLVM_VERSION/bin" >> "$GITHUB_PATH"

      - name: Clone baseline Pikafish
        run: |
          git clone --quiet "$PIKAFISH_REPO" base
          git -C base checkout --quiet "$BASE_COMMIT"

      - name: Clone Pikafish to be patched
        run: |
          git clone --quiet "$PIKAFISH_REPO" patched
          git -C patched checkout --quiet "$BASE_COMMIT"

      - name: Apply patch (fail fast if it doesn't apply cleanly)
        run: |
          PATCH_ABS="$GITHUB_WORKSPACE/${{ github.event.inputs.patch_file }}"
          git -C patched apply --check "$PATCH_ABS"
          git -C patched apply "$PATCH_ABS"

      - name: Build baseline
        run: make -C base/src -j4 build ARCH="$PIKAFISH_ARCH" COMP="$PIKAFISH_COMP"

      - name: Build patched
        run: make -C patched/src -j4 build ARCH="$PIKAFISH_ARCH" COMP="$PIKAFISH_COMP"

      - name: Check NNUE network file actually downloaded (diagnostic)
        run: |
          echo "## 📦 NNUE network file check" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          for f in base/src/pikafish.nnue patched/src/pikafish.nnue; do
            if [ -f "$f" ]; then
              ls -la "$f" | tee -a "$GITHUB_STEP_SUMMARY"
              file "$f" 2>/dev/null | tee -a "$GITHUB_STEP_SUMMARY" || true
            else
              echo "$f: KHÔNG TỒN TẠI" | tee -a "$GITHUB_STEP_SUMMARY"
            fi
          done
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test both binaries actually SEARCH (not just handshake)
        run: |
          # Lần trước: engine tự báo "network file was not loaded successfully"
          # dù file .nnue tồn tại đúng chỗ, đúng kích thước -- cơ chế tự dò
          # thư mục binary đã đổi giữa các bản Pikafish và không phải lúc nào
          # cũng đáng tin. Theo đúng gợi ý của chính engine ("might need to
          # specify the full path"), giờ set EvalFile bằng đường dẫn TUYỆT ĐỐI
          # tường minh thay vì để engine tự đoán.
          set +e
          echo "## 🔍 Search smoke test (repeated d/go x8, như generate_opening thật)" >> "$GITHUB_STEP_SUMMARY"
          for tag in base patched; do
            echo "===== $tag/src/pikafish ====="
            ABS_NNUE="$GITHUB_WORKSPACE/$tag/src/pikafish.nnue"
            CMDS="uci\nsetoption name EvalFile value ${ABS_NNUE}\nisready\nucinewgame\nsetoption name MultiPV value 4\nisready"
            for i in 1 2 3 4 5 6 7 8; do
              CMDS="${CMDS}\nposition startpos\nd\nisready\ngo movetime 100"
            done
            CMDS="${CMDS}\nquit"
            OUTPUT=$(cd "$tag/src" && printf '%b\n' "$CMDS" | ./pikafish 2>&1)
            code=$?
            echo "$OUTPUT" | tail -40
            echo "===== $tag exit code: $code ====="
            if [ $code -ne 0 ]; then
              # exit code = 128 + signal number CHỈ khi process bị OS kill
              # (segfault/OOM). exit 1 thường là engine TỰ thoát có chủ đích
              # (ví dụ báo lỗi network) chứ không phải bị kill -- không suy
              # ra tên tín hiệu bừa cho trường hợp này.
              case $code in
                1) SIGNAME="engine tự thoát (exit 1) -- đọc output phía trên để biết lý do thật, KHÔNG phải bị OS kill" ;;
                134) SIGNAME="SIGABRT (assert()/abort() trong code -- thường có message ở trên)" ;;
                139) SIGNAME="SIGSEGV (segfault -- lỗi truy cập bộ nhớ, KHÔNG có message)" ;;
                137) SIGNAME="SIGKILL (rất có thể bị OOM killer giết vì hết RAM -- cũng KHÔNG có message)" ;;
                *) SIGNAME="mã thoát $code (>128 thường = signal $((code - 128)), nếu không thì engine tự thoát có chủ đích)" ;;
              esac
              echo "!!! $tag/src/pikafish CRASHED: $SIGNAME"
              {
                echo "### ❌ $tag/src/pikafish CRASHED"
                echo "- Exit code: **$code** → $SIGNAME"
                echo '```'
                echo "$OUTPUT"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              CRASHED=1
            else
              echo "✅ $tag/src/pikafish: OK (exit 0)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          set -e
          if [ "${CRASHED:-0}" = "1" ]; then
            echo "Dừng lại ở đây: ít nhất 1 binary crash khi search thật. Không chạy A/B match nữa."
            exit 1
          fi

      - name: Ensure book directory + files exist (first run creates them)
        run: |
          mkdir -p book
          touch book/pikafish_book.obk book/pikafish_book_candidates.obk
          echo "Book hiện có: $(grep -c . book/pikafish_book.obk 2>/dev/null || echo 0) vị trí đã xác nhận, " \
               "$(grep -c . book/pikafish_book_candidates.obk 2>/dev/null || echo 0) đang chờ nâng cấp."

      - name: Run A/B match (with book-building)
        run: |
          BOOK_ARGS=""
          if [ "${{ github.event.inputs.build_book }}" = "true" ]; then
            BOOK_ARGS="--obk-path book/pikafish_book.obk --obk-candidates-path book/pikafish_book_candidates.obk --use-cdb"
          fi
          python3 -u pika_match.py \
            --engine1 base/src/pikafish \
            --engine2 patched/src/pikafish \
            --games "${{ github.event.inputs.games }}" \
            --movetime "${{ github.event.inputs.movetime }}" \
            --opening-plies 8 \
            --opening-multipv 4 \
            --opening-movetime 100 \
            --max-plies 260 \
            --move-timeout 15 \
            --out results.csv \
            --summary-json summary.json \
            --min-score "${{ github.event.inputs.min_score }}" \
            --e2-options "OwnBook=false" \
            $BOOK_ARGS

      - name: Promote candidate positions to depth>=30 (bounded)
        if: github.event.inputs.build_book == 'true' && github.event.inputs.promote_candidates != '0'
        run: |
          python3 -u build_book.py \
            --engine patched/src/pikafish \
            --candidates book/pikafish_book_candidates.obk \
            --obk book/pikafish_book.obk \
            --min-depth 30 --max-time 300 --use-cdb \
            --limit "${{ github.event.inputs.promote_candidates }}"

      - name: Commit updated book back to this repo
        if: github.event.inputs.build_book == 'true'
        run: |
          git config user.name "pikafish-book-bot"
          git config user.email "actions@github.com"
          git add book/pikafish_book.obk book/pikafish_book_candidates.obk
          if git diff --cached --quiet; then
            echo "Book không đổi, không commit."
          else
            N=$(grep -c . book/pikafish_book.obk 2>/dev/null || echo 0)
            git commit -m "Update book: ${N} vị trí đã xác nhận [skip ci]"
            git push
          fi

      - name: Upload results (always, even if the CI gate failed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pikafish-ab-results
          path: |
            results.csv
            summary.json
            engine1_stderr.log
            engine2_stderr.log
          if-no-files-found: ignore
