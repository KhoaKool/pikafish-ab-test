name: Pikafish A/B Elo Test

# Chạy tay từ tab "Actions" trên GitHub (workflow_dispatch), điền số ván /
# movetime / đường dẫn patch. Không tự chạy khi push, để tránh tốn phút CI
# miễn phí ngoài ý muốn -- muốn tự động hoá theo push thì đổi phần "on:".
on:
  workflow_dispatch:
    inputs:
      patch_file:
        description: "Đường dẫn file .patch trong repo này"
        required: true
        default: "patches/pikafish-aggro-HEAD.patch"
      games:
        description: "Số ván"
        required: false
        default: "40"
      movetime:
        description: "ms suy nghĩ mỗi nước"
        required: false
        default: "2000"
      min_score:
        description: "Ngưỡng score tối thiểu để job PASS (0.0-1.0, vd 0.5 = phải hòa vốn trở lên)"
        required: false
        default: "0.45"

env:
  # Dùng đúng công thức build mà chính CI của official-pikafish/Pikafish đã
  # xác nhận chạy được trên GitHub-hosted runner (.github/workflows/pikafish.yml
  # trong repo gốc) -- KHÔNG dùng ARCH=avx2 + COMP=gcc + profile-build như bản
  # nháp trước (bản đó chưa ai xác nhận chạy được trên CI, và profile-build
  # tốn CPU/RAM hơn hẳn 'build' thường vì phải build 2 lần (PGO): 1 lần bản
  # instrumented, chạy benchmark lấy profile, rồi build lại lần 2).
  PIKAFISH_ARCH: x86-64-universal
  PIKAFISH_COMP: clang
  # Chốt ở commit MỚI NHẤT (cùng thời điểm với master-net hiện tại) thay vì
  # commit cũ 8ab92480 -- lý do: master-net trên GitHub Releases là 1 tag
  # BỊ GHI ĐÈ liên tục, không giữ lịch sử. Pin vào commit cũ + luôn tải net
  # mới nhất gây lệch phiên bản (network không load được -- xem issue #130
  # của chính dự án Pikafish, cùng triệu chứng). Patch đã được port lại để
  # áp đúng lên commit này.
  BASE_COMMIT: 7c09ec2578c3b7a48ce4ee5cd067971ef9c4c320
  PIKAFISH_REPO: https://github.com/official-pikafish/Pikafish.git

jobs:
  ab-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 480
    steps:
      - name: Checkout this repo (patch file + scripts)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up clang/libc++ (same recipe official Pikafish CI uses)
        run: |
          LLVM_VERSION=22
          curl -s https://apt.llvm.org/llvm.sh | sudo bash -s -- $LLVM_VERSION
          sudo apt-get install -y libc++-$LLVM_VERSION-dev libc++abi-$LLVM_VERSION-dev libunwind-$LLVM_VERSION-dev
          echo "EXTRACXXFLAGS=-stdlib=libc++" >> "$GITHUB_ENV"
          echo "EXTRALDFLAGS=-stdlib=libc++" >> "$GITHUB_ENV"
          echo "/usr/lib/llvm-$LLVM_VERSION/bin" >> "$GITHUB_PATH"

      - name: Clone baseline Pikafish
        run: |
          git clone --quiet "$PIKAFISH_REPO" base
          git -C base checkout --quiet "$BASE_COMMIT"

      - name: Clone Pikafish to be patched
        run: |
          git clone --quiet "$PIKAFISH_REPO" patched
          git -C patched checkout --quiet "$BASE_COMMIT"

      - name: Apply patch (fail fast if it doesn't apply cleanly)
        run: |
          PATCH_ABS="$GITHUB_WORKSPACE/${{ github.event.inputs.patch_file }}"
          git -C patched apply --check "$PATCH_ABS"
          git -C patched apply "$PATCH_ABS"

      - name: Build baseline
        run: make -C base/src -j4 build ARCH="$PIKAFISH_ARCH" COMP="$PIKAFISH_COMP"

      - name: Build patched
        run: make -C patched/src -j4 build ARCH="$PIKAFISH_ARCH" COMP="$PIKAFISH_COMP"

      - name: Check NNUE network file actually downloaded (diagnostic)
        run: |
          echo "## 📦 NNUE network file check" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          for f in base/src/pikafish.nnue patched/src/pikafish.nnue; do
            if [ -f "$f" ]; then
              ls -la "$f" | tee -a "$GITHUB_STEP_SUMMARY"
              file "$f" 2>/dev/null | tee -a "$GITHUB_STEP_SUMMARY" || true
            else
              echo "$f: KHÔNG TỒN TẠI" | tee -a "$GITHUB_STEP_SUMMARY"
            fi
          done
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test both binaries actually SEARCH (not just handshake)
        run: |
          # Lỗi ta gặp chỉ xảy ra khi engine thực sự search (lệnh 'go'), không
          # phải lúc bắt tay UCI ('uci'/'isready'). Bước cũ chỉ test bắt tay
          # nên không bắt được crash này. Bước mới gửi 1 lệnh 'go' thật, in
          # TOÀN BỘ output (kể cả lỗi/segfault) thẳng ra log chính VÀ vào
          # GitHub Step Summary -- không cần tải artifact riêng nữa.
          set +e
          echo "## 🔍 Search smoke test" >> "$GITHUB_STEP_SUMMARY"
          for tag in base patched; do
            echo "===== $tag/src/pikafish ====="
            OUTPUT=$(cd "$tag/src" && printf 'uci\nisready\nucinewgame\nposition startpos\ngo movetime 500\nquit\n' \
              | ./pikafish 2>&1)
            code=$?
            echo "$OUTPUT"
            echo "===== $tag exit code: $code ====="
            if [ $code -ne 0 ]; then
              # exit code = 128 + signal number khi process bị OS kill. Các mã
              # hay gặp: 134=SIGABRT (assert/abort), 139=SIGSEGV (segfault,
              # lỗi bộ nhớ), 137=SIGKILL (thường do OOM killer giết vì hết RAM).
              case $code in
                134) SIGNAME="SIGABRT (assert()/abort() trong code -- thường có message ở trên)" ;;
                139) SIGNAME="SIGSEGV (segfault -- lỗi truy cập bộ nhớ, KHÔNG có message, đúng như stderr rỗng bạn gặp)" ;;
                137) SIGNAME="SIGKILL (rất có thể bị OOM killer giết vì hết RAM -- cũng KHÔNG có message)" ;;
                *) SIGNAME="mã tín hiệu $((code - 128))" ;;
              esac
              echo "!!! $tag/src/pikafish CRASHED: $SIGNAME"
              {
                echo "### ❌ $tag/src/pikafish CRASHED"
                echo "- Exit code: **$code** → $SIGNAME"
                echo '```'
                echo "$OUTPUT"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              CRASHED=1
            else
              echo "✅ $tag/src/pikafish: OK (exit 0)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          set -e
          if [ "${CRASHED:-0}" = "1" ]; then
            echo "Dừng lại ở đây: ít nhất 1 binary crash khi search thật. Không chạy A/B match nữa."
            exit 1
          fi

      - name: Run A/B match
        run: |
          python3 -u pika_match.py \
            --engine1 base/src/pikafish \
            --engine2 patched/src/pikafish \
            --games "${{ github.event.inputs.games }}" \
            --movetime "${{ github.event.inputs.movetime }}" \
            --max-plies 260 \
            --move-timeout 15 \
            --out results.csv \
            --summary-json summary.json \
            --min-score "${{ github.event.inputs.min_score }}"

      - name: Upload results (always, even if the CI gate failed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pikafish-ab-results
          path: |
            results.csv
            summary.json
            engine1_stderr.log
            engine2_stderr.log
          if-no-files-found: ignore
